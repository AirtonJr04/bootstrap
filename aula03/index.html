<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Prática Bootstrap</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

</head>
<body class="p-4">

<h1>Prática Bootstrap</h1>

<h3>Botões</h3>
<button class="btn btn-primary">Primary</button>
<button class="btn btn-warning">Warning</button>
<button class="btn btn-success">Success</button>

<h3 class="mt-4">Dropdown</h3>
<div class="dropdown">
<button class="btn btn-primary dropdown-toggle" data-toggle="dropdown">
Menu
</button>

<div class="dropdown-menu">
<a class="dropdown-item" href="#">Item 1</a>
<a class="dropdown-item" href="#">Item 2</a>
</div>
</div>

<h3 class="mt-4">Lista</h3>
<ul class="list-group">
<li class="list-group-item">Item 1</li>
<li class="list-group-item">Item 2</li>
<li class="list-group-item">Item 3</li>
</ul>

<h3 class="mt-4">Badge</h3>
<button class="btn btn-primary">
Mensagens <span class="badge badge-light">4</span>
</button>

<h3 class="mt-4">Navbar</h3>
<nav class="navbar navbar-light bg-light">
<a class="navbar-brand" href="#">Meu Site</a>
</nav>

<h3 class="mt-4">Alerta</h3>
<div class="alert alert-success">
Exemplo de alerta
</div>

<h3 class="mt-4">Barra de Progresso</h3>
<div class="progress">
<div class="progress-bar" style="width:50%">
50%
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
